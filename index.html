DOCTYPE html>
<html>
<head>
    <title>ABC Public School</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Navbar */
        .navbar {
            background-color: #333;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
        }

        .navbar a:hover {
            color: yellow;
        }

        /* Sections */
        .section {
            padding: 40px;
            text-align: center;
        }

        .home {
            background-color: lightblue;
        }

        .about {
            background-color: lightgreen;
        }

        .contact {
            background-color: lightgray;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>

    <!-- Home Section -->
    <div class="section home">
        <h1>🌟 ABC Public School 🌟</h1>
        <p>Welcome to our official school website</p>
        <img src="https://via.placeholder.com/300" alt="School Image">
    </div>

    <!-- About Section -->
    <div class="section about">
        <h2>About Our School</h2>
        <p>ABC Public School provides quality education and focuses on discipline and overall development.</p>
    </div>

    <!-- Contact Section -->
    <div class="section contact">
        <h2>Contact Us</h2>
        <p>Email: school@gmail.com</p>
    </div>

</body>
</html>
